version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: vibe_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:latest
    container_name: vibe_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mongodb_data:
  redis_data:
